name: Release

on:
  push:
    tags:
      - 'v*.*.*'

env:
  RUST_BACKTRACE: 1
  CARGO_TERM_COLOR: always

jobs:
  # ─────────────────────────────────────────────────────────────
  # Build signed desktop binaries for all platforms
  # ─────────────────────────────────────────────────────────────
  release-desktop:
    name: Release Desktop (${{ matrix.platform }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-arm64
            runner: macos-latest
            target: aarch64-apple-darwin
          - platform: macos-x64
            runner: macos-latest
            target: x86_64-apple-darwin
          - platform: linux-x64
            runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - platform: windows-x64
            runner: windows-latest
            target: x86_64-pc-windows-msvc
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Install system deps (Linux)
        if: matrix.runner == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev \
            librsvg2-dev patchelf libssl-dev pkg-config

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: pnpm install
        run: pnpm install --frozen-lockfile

      - name: Tauri build (signed)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # macOS notarization
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Tacoshell ${{ github.ref_name }}'
          releaseBody: 'See CHANGELOG.md for details.'
          releaseDraft: true
          prerelease: false
          args: --target ${{ matrix.target }}

  # ─────────────────────────────────────────────────────────────
  # Build and publish WASM package to npm
  # ─────────────────────────────────────────────────────────────
  release-wasm:
    name: Publish WASM to npm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install wasm-pack
        run: cargo install wasm-pack --locked

      - name: Build WASM (release)
        run: wasm-pack build packages/core-wasm --target web --release

      - name: Set version in package.json
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          jq --arg v "$VERSION" '.version = $v' packages/core-wasm/pkg/package.json > tmp.json
          mv tmp.json packages/core-wasm/pkg/package.json

      - name: Set up Node.js for npm publish
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'

      - name: Publish to npm
        run: npm publish packages/core-wasm/pkg --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # ─────────────────────────────────────────────────────────────
  # Deploy web app to production
  # ─────────────────────────────────────────────────────────────
  release-web:
    name: Deploy Web to Production
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install wasm-pack
        run: cargo install wasm-pack --locked

      - name: Build WASM
        run: wasm-pack build packages/core-wasm --target web --release

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: pnpm install
        run: pnpm install --frozen-lockfile

      - name: Build web app
        run: pnpm --filter web-app build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: tacoshell
          directory: packages/web-app/dist

  # ─────────────────────────────────────────────────────────────
  # Generate and publish changelog
  # ─────────────────────────────────────────────────────────────
  changelog:
    name: Generate Changelog
    runs-on: ubuntu-latest
    needs: [release-desktop, release-wasm, release-web]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install git-cliff
        run: cargo install git-cliff --locked

      - name: Generate CHANGELOG.md
        run: git-cliff --output CHANGELOG.md

      - name: Commit changelog
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'chore: update CHANGELOG.md for ${{ github.ref_name }}'
          file_pattern: CHANGELOG.md
