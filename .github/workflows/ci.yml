name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  RUST_BACKTRACE: 1
  CARGO_TERM_COLOR: always

jobs:
  # ─────────────────────────────────────────────────────────────
  # Lint
  # ─────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Install system dependencies (GTK / WebKit)
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev \
            librsvg2-dev patchelf libssl-dev pkg-config

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

      - name: cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: pnpm install
        run: pnpm install --frozen-lockfile

      - name: ESLint
        run: pnpm -r run lint

      - name: Prettier check
        run: pnpm -r run format:check

      - name: TypeScript typecheck
        run: pnpm -r run typecheck

  # ─────────────────────────────────────────────────────────────
  # Rust Unit Tests
  # ─────────────────────────────────────────────────────────────
  test-rust:
    name: Rust Tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Install system dependencies (GTK / WebKit — Linux only)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev \
            librsvg2-dev patchelf libssl-dev pkg-config

      - name: cargo test
        run: cargo test --workspace --lib --bins

      - name: Install cargo-tarpaulin (Linux only)
        if: matrix.os == 'ubuntu-latest'
        run: cargo install cargo-tarpaulin --locked

      - name: Generate coverage (Linux only)
        if: matrix.os == 'ubuntu-latest'
        run: cargo tarpaulin --workspace --lib --out xml --output-dir coverage/

      - name: Upload coverage to Codecov (Linux only)
        if: matrix.os == 'ubuntu-latest'
        uses: codecov/codecov-action@v4
        with:
          files: coverage/cobertura.xml
          flags: rust
          token: ${{ secrets.CODECOV_TOKEN }}

  # ─────────────────────────────────────────────────────────────
  # Rust Integration Tests (requires Docker)
  # ─────────────────────────────────────────────────────────────
  test-integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: test-rust
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: cargo test (integration)
        run: cargo test --workspace --features integration -- --include-ignored

  # ─────────────────────────────────────────────────────────────
  # WASM Tests
  # ─────────────────────────────────────────────────────────────
  test-wasm:
    name: WASM Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Install wasm-pack
        run: cargo install wasm-pack --locked

      - name: wasm-pack test (headless Node)
        run: wasm-pack test packages/core-wasm --node

      - name: wasm-pack build
        run: wasm-pack build packages/core-wasm --target web

      - name: Check WASM binary size
        run: |
          SIZE=$(wc -c < packages/core-wasm/pkg/core_wasm_bg.wasm)
          echo "WASM size: ${SIZE} bytes"
          # Fail if > 5MB uncompressed (gzipped target is <2MB)
          if [ "$SIZE" -gt "5242880" ]; then
            echo "WASM binary too large: ${SIZE} bytes (limit: 5MB)"
            exit 1
          fi

  # ─────────────────────────────────────────────────────────────
  # TypeScript Tests
  # ─────────────────────────────────────────────────────────────
  test-typescript:
    name: TypeScript Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: pnpm install
        run: pnpm install --frozen-lockfile

      - name: Run tests with coverage
        run: pnpm -r run test:coverage

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: packages/ui/coverage/lcov.info
          flags: typescript
          token: ${{ secrets.CODECOV_TOKEN }}

  # ─────────────────────────────────────────────────────────────
  # Security Audit
  # ─────────────────────────────────────────────────────────────
  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: cargo audit
        run: cargo audit

      - name: npm audit
        run: pnpm audit --audit-level=high

  # ─────────────────────────────────────────────────────────────
  # Build Desktop (gated on tests passing)
  # ─────────────────────────────────────────────────────────────
  build-desktop:
    name: Build Desktop (${{ matrix.platform }})
    needs: [lint, test-rust, test-typescript]
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-arm64
            runner: macos-latest
          - platform: linux-x64
            runner: ubuntu-latest
          - platform: windows-x64
            runner: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Install system deps (Linux)
        if: matrix.runner == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev \
            librsvg2-dev patchelf libssl-dev pkg-config

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: pnpm install
        run: pnpm install --frozen-lockfile

      - name: Tauri build
        run: pnpm --filter tauri-app tauri build

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.platform }}
          path: packages/tauri-app/src-tauri/target/release/bundle/
          retention-days: 7

  # ─────────────────────────────────────────────────────────────
  # Build Web
  # ─────────────────────────────────────────────────────────────
  build-web:
    name: Build Web App
    needs: [lint, test-wasm, test-typescript]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Install wasm-pack
        run: cargo install wasm-pack --locked

      - name: Build WASM
        run: wasm-pack build packages/core-wasm --target web --release

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: pnpm install
        run: pnpm install --frozen-lockfile

      - name: Build web app
        run: pnpm --filter web-app build

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: web-app
          path: packages/web-app/dist/
          retention-days: 7
