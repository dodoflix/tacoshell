# Tacoshell Security Rules

## Action

Never log decrypted vault contents, passwords, or private keys. Never store Master Key on disk. All GitHub data must be AES-256-GCM encrypted. Use SecretString/Zeroizing for sensitive data.

## Evidence

- Security rules documented in docs/SECURITY.md and CLAUDE.md
- Sensitive data uses SecretString (secrecy) or Zeroizing<T> (zeroize)
- Vault writes go through storage engine only

