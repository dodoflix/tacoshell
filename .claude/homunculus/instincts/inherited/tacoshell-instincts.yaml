# Tacoshell Architecture Separation

## Action

Rust core has zero knowledge of UI. UI has zero direct network/filesystem access (goes through Tauri IPC or WASM bridge). Stores never directly import each other.

## Evidence

- Architecture rules documented in docs/ARCHITECTURE.md and CLAUDE.md
- Clear separation between core (Rust) and UI (TypeScript)
- All communication via Tauri IPC or WASM bridge
