[package]
name = "tacoshell"
version = "0.1.0"
edition = "2021"

[lib]
name = "tacoshell_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = [] }
tauri-plugin-oauth = { version = "2", package = "tauri-plugin-oauth" }
tauri-plugin-store = "2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["full"] }
anyhow = "1"
tracing = "0.1"
open = "5"
url = { workspace = true }
reqwest = { version = "0.12", features = ["json"] }
# core crate
tacoshell-core = { path = "../../core" }

[dev-dependencies]
wiremock = { workspace = true }
tokio-test = { workspace = true }
